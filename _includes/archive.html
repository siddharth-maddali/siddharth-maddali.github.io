{% include blogmenu.html %}

<div style="text-align: center; margin: 2rem 0;">
    <img src="/images/blog/wordcloud.png" alt="Blog Word Cloud" class="responsive-img-full" style="max-width: 100%; box-shadow: none;">
</div>

<!--
	The way to do this was found here: 
	https://gist.github.com/tuananh/7432553
-->


{% assign postsByYearMonth = site.posts | group_by_exp:"post", "post.date | date: '%Y %b'"  %}
{% for yearMonth in postsByYearMonth %}
  <h2>{{ yearMonth.name }}</h2>
    <ul>
      {% for post in yearMonth.items %}
	  <h3><li><a href="{{ post.url }}">{{ post.title }}</a></li></h3>
      {% endfor %}
    </ul>
{% endfor %}
