<div class="blog-header">
    <h1>Blog</h1>
    <nav class="blog-nav">
        <ul class="blog-menu-list">
            {% for item in site.data.blog %}
                <li>
                    <a href="{{ item.link }}">
                        {{ item.name }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </nav>
</div>
