{% include blogmenu.html %}

<div style="text-align: center; margin: 2rem 0;">
    <img src="/images/blog/wordcloud.png" alt="Blog Word Cloud" class="responsive-img-full" style="max-width: 100%; box-shadow: none;">
</div>

<ul>
  {% for post in site.posts %}
    <li>
		<h2><a href="{{ post.url }}">{{ post.date | date_to_long_string}}:</br>{{ post.title }}</a></h2>
		<p>{{ post.excerpt }}</p>
    </li>
  {% endfor %}
</ul>
