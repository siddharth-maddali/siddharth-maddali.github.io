
{% for item in site.data.software %}

<ul class="flex-container">
	<li class="flex-item">
		<h2>{{ item.name }}<a href="{{ item.link }}">   <img src="/images/Web.svg"></a></h2>
		<b>Description</b>: {{ item.blurb }}<br/>
		<b>Language(s)</b>: {{item.langs }}<br/>
		<b>Hardware</b>: {{ item.hardware }}
	</li>
	<li>
		<figure>
			<img src="{{ item.logo }}" style="width:60%">
		</figure>
	</li>
</ul>
{% endfor %}
